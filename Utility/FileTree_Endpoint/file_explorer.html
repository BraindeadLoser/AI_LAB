<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>File Explorer</title>
  <style>
    ul { list-style-type: none; }
    li { cursor: pointer; margin: 4px 0; }
    .folder { font-weight: bold; }
    .file { color: blue; }
  </style>
</head>
<body>
  <h2>Collapsible File Tree</h2>
  <div id="tree"></div>
  <pre id="definition"></pre>

  <script>
    async function loadTree() {
      const res = await fetch('/tree');
      const tree = await res.json();
      renderTree(tree, document.getElementById('tree'));
    }

function renderTree(node, container) {
  const ul = document.createElement('ul');
  node.children?.forEach(child => {
    const li = document.createElement('li');

    if (child.isFolder) {
      // Folder node handling
      li.textContent = ''; // Clear existing text

      // Create toggle button
      const toggleBtn = document.createElement('button');
      toggleBtn.textContent = '+';
      toggleBtn.style.marginRight = '6px';
      toggleBtn.style.cursor = 'pointer';

      // Create folder name span
      const folderSpan = document.createElement('span');
      folderSpan.textContent = child.name;
      folderSpan.className = 'folder';

      li.appendChild(toggleBtn);
      li.appendChild(folderSpan);

      let expanded = false;

      toggleBtn.onclick = (e) => {
        e.stopPropagation();

        if (!expanded) {
          if (!li.querySelector('ul')) {
            renderTree(child, li);
          } else {
            li.querySelector('ul').style.display = 'block';
          }
          toggleBtn.textContent = '-';
          expanded = true;
        } else {
          if (li.querySelector('ul')) {
            li.querySelector('ul').style.display = 'none';
          }
          toggleBtn.textContent = '+';
          expanded = false;
        }
      };
    } else {
      // File node handling
      li.textContent = ''; // Clear existing text

      // Create circular dot button
      const dotBtn = document.createElement('button');
      dotBtn.textContent = '●';
      dotBtn.style.borderRadius = '50%';
      dotBtn.style.width = '16px';
      dotBtn.style.height = '16px';
      dotBtn.style.padding = '0';
      dotBtn.style.marginRight = '6px';
      dotBtn.style.border = 'none';
      dotBtn.style.backgroundColor = '#555';
      dotBtn.style.color = 'white';
      dotBtn.style.cursor = 'pointer';
      dotBtn.title = 'Show definition';

      // Create file name span
      const fileSpan = document.createElement('span');
      fileSpan.textContent = child.name;
      fileSpan.className = 'file';

      li.appendChild(dotBtn);
      li.appendChild(fileSpan);

      dotBtn.onclick = async (e) => {
        e.stopPropagation();
        const res = await fetch('/definition?path=' + encodeURIComponent(child.path));
        const def = await res.json();
        document.getElementById('definition').textContent = JSON.stringify(def, null, 2);
      };
    }

    ul.appendChild(li);
  });
  container.appendChild(ul);
}

    loadTree();
  </script>
</body>
</html>
