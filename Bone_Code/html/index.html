<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  
<div id="panel" style="display:none; position:absolute; top:50px; right:10px; background:#222; padding:10px; border-radius:8px; color:white;">
  
  <div>
    <label>User:</label>
    <input type="color" id="userColor">
  </div>

  <div>
    <label>AI:</label>
    <input type="color" id="aiColor">
  </div>

  <div>
    <label>Background:</label>
    <input type="color" id="bgColor">
  </div>

<button id="applyBtn">Apply</button>
</div>

<div id="sidebar">
  <button id="newChatBtn">+ New Chat</button>
  <div id="chatList"></div>

  <div id="resizer"></div>
</div>

<div id="main">
  <div style="display: flex; justify-content: flex-end; gap: 10px; margin: 10px;">
    <button id="toggleBtn">Toggle Sidebar</button>
    <button id="customizeBtn">Customize</button>
    <button id="consoleToggleBtn">Toggle Console</button> <!-- NEW -->
  </div>
  <div id="chat"></div>

  <div id="inputArea">
<input type="text" id="input" placeholder="Send a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>
<div id="ai-suggestions"
     style="max-height:150px; overflow:auto; background:#222; color:#fff;
            font-size:12px; padding:5px; border-top:1px solid #555;">
  <!-- AI recommendations will appear here -->
</div>
<!-- Bottom console panel -->
<div id="bottom-console"
     style="display:none; position:fixed; bottom:0; left:0; right:0;
            height:200px; overflow:auto;
            background:#111; color:#0f0;
            font-size:12px; padding:5px;
            border-top:2px solid #333; z-index:9999;">
  <!-- Logs will appear here -->
</div>
<script type="module" src="../js/storage.js"></script>
<script type="module" src="../js/conversations.js"></script>
<script type="module" src="../js/renderer.js"></script>
</body>
</html>
