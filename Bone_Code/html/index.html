<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  
<div id="panel" style="display:none; position:absolute; top:50px; right:10px; background:#222; padding:10px; border-radius:8px; color:white;">
  
  <div>
    <label>User:</label>
    <input type="color" id="userColor">
  </div>

  <div>
    <label>AI:</label>
    <input type="color" id="aiColor">
  </div>

  <div>
    <label>Background:</label>
    <input type="color" id="bgColor">
  </div>

<button id="applyBtn">Apply</button>
</div>

<div id="sidebar">
  <button id="newChatBtn">+ New Chat</button>
  <div id="chatList"></div>

  <div id="resizer"></div>
</div>

<div id="main">
  <div style="display: flex; justify-content: flex-end; gap: 10px; margin: 10px;">
    <button id="toggleBtn">Toggle Sidebar</button>
    <button id="customizeBtn">Customize</button>
  </div>
  <div id="chat"></div>

  <div id="inputArea">
<input type="text" id="input" placeholder="Send a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module" src="../js/storage.js"></script>
<script type="module" src="../js/conversations.js"></script>
<script type="module" src="../js/renderer.js"></script>
</body>
</html>
