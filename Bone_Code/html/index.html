<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: #343541;
  color: white;
  display: flex;
  height: 100vh;
}

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .msg {
  max-width: 70%;
  padding: 12px 16px;
  margin: 10px 0;
  border-radius: 12px;
  line-height: 1.5;
  font-size: 14px;
}

    .user {
      background: #0b93f6;
      align-self: flex-end;
      margin-left: auto;
    }

    .ai {
      background: #444654;
      align-self: flex-start;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    #input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  outline: none;
  font-size: 14px;
}

    button {
      margin-left: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #19c37d;
      color: white;
      cursor: pointer;
    }

    #sidebar {
  width: 250px;
  height: 100vh;
  background: #202123;
  color: white;
  position: fixed;
  left: 0;
  top: 0;
  padding: 10px;
  overflow-y: auto;
}

#chatList {
  margin-top: 10px;
}

.chat-item {
  padding: 8px;
  cursor: pointer;
  border-radius: 5px;
}

.chat-item:hover {
  background: #2a2b32;
}

#main {
  margin-left: 250px;
  display: flex;
  flex-direction: column;
  flex: 1;
}

#resizer {
  width: 5px;
  cursor: ew-resize;
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  background: transparent;
}
  </style>
</head>

<body>
  
<div id="panel" style="display:none; position:absolute; top:50px; right:10px; background:#222; padding:10px; border-radius:8px; color:white;">
  
  <div>
    <label>User:</label>
    <input type="color" id="userColor">
  </div>

  <div>
    <label>AI:</label>
    <input type="color" id="aiColor">
  </div>

  <div>
    <label>Background:</label>
    <input type="color" id="bgColor">
  </div>

<button id="applyBtn">Apply</button>
</div>

<div id="sidebar">
  <button id="newChatBtn">+ New Chat</button>
  <div id="chatList"></div>

  <div id="resizer"></div>
</div>

<div id="main">
  <div style="display: flex; justify-content: flex-end; gap: 10px; margin: 10px;">
    <button id="toggleBtn">Toggle Sidebar</button>
    <button id="customizeBtn">Customize</button>
  </div>
  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Send a message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module" src="renderer.js"></script>
</body>
</html>
